appId: com.opennote.app
productName: OpenNote
directories:
  output: release
  buildResources: build

files:
  - dist/**
  - dist-electron/**
  - package.json

asar: true
# PGlite WASM assets must not be packed inside asar (loaded via fs at runtime)
asarUnpack:
  - "**/node_modules/@electric-sql/pglite/**"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

publish: null
